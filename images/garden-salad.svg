<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3b1a"/>
      <stop offset="50%" style="stop-color:#1a0545"/>
      <stop offset="100%" style="stop-color:#0d2a3e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#6bcb77;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="240" rx="200" ry="170" fill="url(#glow)"/>
  <circle cx="80" cy="55" r="42" fill="#6bcb77" opacity="0.07"/>
  <circle cx="520" cy="80" r="48" fill="#ffd93d" opacity="0.06"/>
  <!-- Bowl -->
  <ellipse cx="300" cy="255" rx="148" ry="78" fill="#1a3d1a" stroke="#6bcb77" stroke-width="1.5" stroke-opacity="0.2" filter="url(#shadow)"/>
  <ellipse cx="300" cy="240" rx="138" ry="62" fill="#1e4d1e"/>
  <!-- Lettuce base -->
  <ellipse cx="300" cy="235" rx="128" ry="52" fill="#4CAF50" opacity="0.5"/>
  <ellipse cx="280" cy="228" rx="45" ry="18" fill="#66BB6A" opacity="0.4" transform="rotate(-10 280 228)"/>
  <ellipse cx="325" cy="235" rx="40" ry="16" fill="#66BB6A" opacity="0.35" transform="rotate(8 325 235)"/>
  <!-- Tomato slices -->
  <g filter="url(#shadow)">
    <circle cx="260" cy="220" r="14" fill="#e74c3c" opacity="0.85"/>
    <circle cx="260" cy="220" r="6" fill="#c0392b" opacity="0.4"/>
    <circle cx="340" cy="238" r="12" fill="#e74c3c" opacity="0.8"/>
    <circle cx="340" cy="238" r="5" fill="#c0392b" opacity="0.4"/>
  </g>
  <!-- Cucumber slices -->
  <g>
    <circle cx="290" cy="240" r="11" fill="#8BC34A" opacity="0.75" filter="url(#shadow)"/>
    <circle cx="290" cy="240" r="7" fill="#9CCC65" opacity="0.5"/>
    <circle cx="318" cy="218" r="10" fill="#8BC34A" opacity="0.7" filter="url(#shadow)"/>
    <circle cx="318" cy="218" r="6.5" fill="#9CCC65" opacity="0.5"/>
  </g>
  <!-- Red onion rings -->
  <g fill="none" stroke="#8e44ad" stroke-width="2.5" opacity="0.5">
    <ellipse cx="355" cy="222" rx="12" ry="6" transform="rotate(15 355 222)"/>
    <ellipse cx="248" cy="240" rx="10" ry="5" transform="rotate(-10 248 240)"/>
  </g>
  <!-- Dressing drizzle -->
  <g fill="#ffd93d" opacity="0.2">
    <path d="M 260 230 Q 280 225 300 232 Q 320 239 340 230" fill="none" stroke="#ffd93d" stroke-width="2" opacity="0.35"/>
  </g>
  <text x="300" y="155" text-anchor="middle" font-size="56" filter="url(#shadow)">🥗</text>
  <text x="300" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f0e6ff" font-weight="bold" filter="url(#shadow)">Fresh Garden Salad</text>
  <text x="300" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a89bc2">Light &amp; Refreshing</text>
</svg>