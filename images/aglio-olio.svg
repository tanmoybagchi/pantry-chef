<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0545"/>
      <stop offset="50%" style="stop-color:#2d1b44"/>
      <stop offset="100%" style="stop-color:#0d2a3e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#ffd93d;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="240" rx="200" ry="170" fill="url(#glow)"/>
  <circle cx="75" cy="60" r="42" fill="#ffd93d" opacity="0.06"/>
  <circle cx="525" cy="75" r="50" fill="#ff6b6b" opacity="0.06"/>
  <!-- Plate -->
  <ellipse cx="300" cy="260" rx="155" ry="55" fill="#e8e0d0" opacity="0.08"/>
  <!-- Spaghetti mound -->
  <g filter="url(#shadow)">
    <path d="M 210 245 Q 230 195 300 205 Q 370 195 390 245 Q 375 275 300 280 Q 225 275 210 245Z" fill="#e8c96a"/>
    <path d="M 220 240 Q 240 200 300 208 Q 360 200 380 240 Q 365 265 300 270 Q 235 265 220 240Z" fill="#f0d87a"/>
  </g>
  <!-- Spaghetti strands (more prominent) -->
  <g fill="none" stroke="#dbb84a" stroke-width="2" opacity="0.5">
    <path d="M 235 225 Q 260 210 295 220 Q 330 230 365 218"/>
    <path d="M 230 238 Q 258 222 290 232 Q 322 242 358 228"/>
    <path d="M 240 250 Q 265 238 295 248 Q 325 258 350 245"/>
    <path d="M 250 258 Q 272 248 298 255 Q 325 262 345 253"/>
    <path d="M 225 232 Q 255 218 285 228 Q 315 238 355 225"/>
  </g>
  <!-- Garlic slices -->
  <g fill="#f5e6c8" opacity="0.7" filter="url(#shadow)">
    <ellipse cx="275" cy="218" rx="6" ry="5"/>
    <ellipse cx="325" cy="225" rx="5.5" ry="4.5"/>
    <ellipse cx="300" cy="235" rx="5" ry="4"/>
    <ellipse cx="345" cy="238" rx="5" ry="4"/>
  </g>
  <!-- Red pepper flakes -->
  <g fill="#e74c3c" opacity="0.55">
    <circle cx="268" cy="230" r="1.5"/>
    <circle cx="312" cy="222" r="1.2"/>
    <circle cx="338" cy="245" r="1.5"/>
    <circle cx="285" cy="252" r="1.3"/>
    <circle cx="355" cy="232" r="1.2"/>
  </g>
  <!-- Parsley -->
  <g fill="#27ae60" opacity="0.65">
    <circle cx="290" cy="215" r="2.2"/>
    <circle cx="320" cy="240" r="2"/>
    <circle cx="260" cy="242" r="1.8"/>
    <circle cx="348" cy="228" r="2"/>
  </g>
  <!-- Oil sheen -->
  <g fill="#ffd93d" opacity="0.1">
    <ellipse cx="290" cy="225" rx="35" ry="12"/>
  </g>
  <text x="300" y="155" text-anchor="middle" font-size="56" filter="url(#shadow)">🧄</text>
  <text x="300" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#f0e6ff" font-weight="bold" filter="url(#shadow)">Spaghetti Aglio e Olio</text>
  <text x="300" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a89bc2">Simple &amp; Classic</text>
</svg>