<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0545"/>
      <stop offset="50%" style="stop-color:#451a03"/>
      <stop offset="100%" style="stop-color:#0d2145"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#ff9f43;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="240" rx="200" ry="170" fill="url(#glow)"/>
  <!-- Decorative -->
  <circle cx="80" cy="60" r="45" fill="#ff9f43" opacity="0.07"/>
  <circle cx="520" cy="80" r="50" fill="#ff6b6b" opacity="0.06"/>
  <circle cx="500" cy="340" r="35" fill="#ffd93d" opacity="0.05"/>
  <!-- Bowl -->
  <ellipse cx="300" cy="250" rx="140" ry="85" fill="#2a1508" stroke="#ff9f43" stroke-width="2" stroke-opacity="0.25" filter="url(#shadow)"/>
  <ellipse cx="300" cy="230" rx="130" ry="68" fill="#3d2210"/>
  <!-- Curry base -->
  <ellipse cx="300" cy="225" rx="120" ry="58" fill="#c65102" opacity="0.8"/>
  <ellipse cx="300" cy="220" rx="115" ry="53" fill="#e8760a" opacity="0.6"/>
  <!-- Chickpeas -->
  <g fill="#e6c88a" filter="url(#shadow)">
    <circle cx="265" cy="215" r="8"/>
    <circle cx="285" cy="208" r="7"/>
    <circle cx="310" cy="212" r="8"/>
    <circle cx="335" cy="218" r="7"/>
    <circle cx="275" cy="230" r="7"/>
    <circle cx="300" cy="228" r="8"/>
    <circle cx="325" cy="232" r="7"/>
    <circle cx="250" cy="225" r="6"/>
    <circle cx="345" cy="226" r="6"/>
  </g>
  <!-- Chickpea details -->
  <g fill="#d4a86a" opacity="0.5">
    <path d="M 262 215 Q 265 212 268 215" fill="none" stroke="#d4a86a" stroke-width="1"/>
    <path d="M 307 212 Q 310 209 313 212" fill="none" stroke="#d4a86a" stroke-width="1"/>
  </g>
  <!-- Spinach leaves -->
  <g fill="#4a8c3f" opacity="0.7">
    <ellipse cx="290" cy="200" rx="12" ry="5" transform="rotate(-20 290 200)"/>
    <ellipse cx="320" cy="205" rx="10" ry="4" transform="rotate(15 320 205)"/>
    <ellipse cx="270" cy="238" rx="11" ry="4" transform="rotate(10 270 238)"/>
  </g>
  <!-- Steam wisps -->
  <g stroke="#fff" stroke-width="1.5" fill="none" opacity="0.15">
    <path d="M 280 175 Q 275 160 280 145 Q 285 130 280 115"/>
    <path d="M 300 170 Q 295 155 300 140 Q 305 125 300 110"/>
    <path d="M 320 175 Q 315 160 320 145 Q 325 130 320 115"/>
  </g>
  <!-- Emoji -->
  <text x="300" y="155" text-anchor="middle" font-size="56" filter="url(#shadow)">🍛</text>
  <!-- Title -->
  <text x="300" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f0e6ff" font-weight="bold" filter="url(#shadow)">Chickpea Curry</text>
  <text x="300" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a89bc2">Warm &amp; Spicy</text>
</svg>