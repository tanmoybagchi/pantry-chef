<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0545"/>
      <stop offset="50%" style="stop-color:#2d1b44"/>
      <stop offset="100%" style="stop-color:#0d2a3e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#c77dff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="240" rx="200" ry="170" fill="url(#glow)"/>
  <!-- Decorative -->
  <circle cx="80" cy="50" r="40" fill="#c77dff" opacity="0.07"/>
  <circle cx="530" cy="70" r="55" fill="#4d96ff" opacity="0.06"/>
  <circle cx="490" cy="340" r="30" fill="#6bcb77" opacity="0.05"/>
  <!-- Plate rim -->
  <ellipse cx="300" cy="252" rx="155" ry="70" fill="#e8e0d0" opacity="0.08" filter="url(#shadow)"/>
  <!-- Bowl -->
  <ellipse cx="300" cy="245" rx="140" ry="82" fill="#1e1235" stroke="#c77dff" stroke-width="1.5" stroke-opacity="0.2" filter="url(#shadow)"/>
  <ellipse cx="300" cy="228" rx="128" ry="65" fill="#2a1845"/>
  <!-- Risotto base -->
  <ellipse cx="300" cy="225" rx="120" ry="58" fill="#f5edd4" opacity="0.85"/>
  <ellipse cx="300" cy="222" rx="115" ry="53" fill="#efe5c8" opacity="0.7"/>
  <!-- Rice texture dots -->
  <g fill="#e0d4b0" opacity="0.6">
    <circle cx="270" cy="218" r="2"/>
    <circle cx="285" cy="212" r="1.8"/>
    <circle cx="300" cy="215" r="2"/>
    <circle cx="315" cy="220" r="1.8"/>
    <circle cx="330" cy="214" r="2"/>
    <circle cx="278" cy="230" r="1.8"/>
    <circle cx="305" cy="232" r="2"/>
    <circle cx="322" cy="228" r="1.8"/>
  </g>
  <!-- Mushroom slices -->
  <g filter="url(#shadow)">
    <path d="M 265 210 Q 270 200 280 205 L 275 215 Z" fill="#8b6d50" opacity="0.8"/>
    <path d="M 310 205 Q 318 196 325 203 L 320 213 Z" fill="#8b6d50" opacity="0.75"/>
    <path d="M 285 228 Q 292 220 298 226 L 294 234 Z" fill="#7a5c42" opacity="0.7"/>
    <path d="M 335 220 Q 340 212 348 218 L 343 226 Z" fill="#8b6d50" opacity="0.65"/>
    <path d="M 255 225 Q 260 218 267 223 L 263 230 Z" fill="#7a5c42" opacity="0.7"/>
  </g>
  <!-- Parmesan shavings -->
  <g fill="#f5e6c8" opacity="0.5">
    <rect x="290" y="200" width="15" height="3" rx="1.5" transform="rotate(-25 297 201)"/>
    <rect x="322" y="210" width="12" height="2.5" rx="1.2" transform="rotate(15 328 211)"/>
    <rect x="268" y="235" width="13" height="2.5" rx="1.2" transform="rotate(-10 274 236)"/>
  </g>
  <!-- Thyme sprigs -->
  <g stroke="#5a8a4a" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 300 195 Q 305 190 310 192"/>
    <circle cx="304" cy="191" r="1.5" fill="#5a8a4a"/>
    <circle cx="308" cy="192" r="1.5" fill="#5a8a4a"/>
  </g>
  <!-- Steam -->
  <g stroke="#fff" stroke-width="1.5" fill="none" opacity="0.12">
    <path d="M 280 178 Q 275 163 280 148 Q 285 133 280 118"/>
    <path d="M 300 173 Q 295 158 300 143 Q 305 128 300 113"/>
    <path d="M 320 178 Q 315 163 320 148 Q 325 133 320 118"/>
  </g>
  <!-- Emoji -->
  <text x="300" y="155" text-anchor="middle" font-size="56" filter="url(#shadow)">🍄</text>
  <!-- Title -->
  <text x="300" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f0e6ff" font-weight="bold" filter="url(#shadow)">Mushroom Risotto</text>
  <text x="300" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a89bc2">Creamy &amp; Earthy</text>
</svg>