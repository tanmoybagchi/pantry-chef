<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0545"/>
      <stop offset="50%" style="stop-color:#2d1b44"/>
      <stop offset="100%" style="stop-color:#0d2a3e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#ffd93d;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="240" rx="200" ry="170" fill="url(#glow)"/>
  <circle cx="80" cy="55" r="42" fill="#ffd93d" opacity="0.07"/>
  <circle cx="520" cy="80" r="48" fill="#6bcb77" opacity="0.06"/>
  <!-- Plate -->
  <ellipse cx="300" cy="255" rx="155" ry="60" fill="#e8e0d0" opacity="0.08"/>
  <!-- Omelette body -->
  <g filter="url(#shadow)">
    <path d="M 190 240 Q 200 200 300 195 Q 400 200 410 240 Q 390 270 300 275 Q 210 270 190 240Z" fill="#f0c850"/>
    <path d="M 195 238 Q 205 205 300 200 Q 395 205 405 238 Q 388 262 300 268 Q 212 262 195 238Z" fill="#f5d870"/>
  </g>
  <!-- Fold line -->
  <path d="M 220 240 Q 300 215 380 240" fill="none" stroke="#d4a030" stroke-width="2" opacity="0.5"/>
  <!-- Filling peaking out -->
  <g opacity="0.8">
    <!-- Bell pepper -->
    <rect x="260" y="232" width="12" height="4" rx="2" fill="#e74c3c" transform="rotate(-10 266 234)"/>
    <rect x="310" y="238" width="10" height="3.5" rx="1.5" fill="#27ae60" transform="rotate(5 315 239)"/>
    <!-- Tomato bits -->
    <circle cx="285" cy="240" r="4" fill="#e74c3c" opacity="0.7"/>
    <circle cx="330" cy="236" r="3.5" fill="#e74c3c" opacity="0.6"/>
    <!-- Cheese melt -->
    <path d="M 275 244 Q 290 248 305 244 Q 315 248 325 244" fill="#ffd93d" opacity="0.5"/>
    <path d="M 280 248 Q 295 252 310 248" fill="#ffd93d" opacity="0.35"/>
  </g>
  <!-- Omelette texture -->
  <g fill="#e0b840" opacity="0.25">
    <ellipse cx="300" cy="220" rx="40" ry="10"/>
    <ellipse cx="260" cy="235" rx="25" ry="8"/>
    <ellipse cx="340" cy="230" rx="25" ry="8"/>
  </g>
  <!-- Egg browning spots -->
  <g fill="#c49a25" opacity="0.2">
    <circle cx="250" cy="230" r="6"/>
    <circle cx="350" cy="225" r="5"/>
    <circle cx="300" cy="210" r="7"/>
  </g>
  <!-- Herb garnish -->
  <g fill="#27ae60" opacity="0.6">
    <circle cx="240" cy="245" r="2"/>
    <circle cx="360" cy="242" r="2.2"/>
    <circle cx="300" cy="260" r="1.8"/>
  </g>
  <!-- Steam -->
  <g stroke="#fff" stroke-width="1.5" fill="none" opacity="0.1">
    <path d="M 280 180 Q 275 165 280 150 Q 285 135 280 120"/>
    <path d="M 300 175 Q 295 160 300 145 Q 305 130 300 115"/>
    <path d="M 320 180 Q 315 165 320 150 Q 325 135 320 120"/>
  </g>
  <text x="300" y="155" text-anchor="middle" font-size="56" filter="url(#shadow)">🥚</text>
  <text x="300" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f0e6ff" font-weight="bold" filter="url(#shadow)">Veggie Omelette</text>
  <text x="300" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a89bc2">Quick &amp; Satisfying</text>
</svg>