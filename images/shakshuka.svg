<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0545"/>
      <stop offset="50%" style="stop-color:#451510"/>
      <stop offset="100%" style="stop-color:#0d2145"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="240" rx="200" ry="170" fill="url(#glow)"/>
  <circle cx="80" cy="60" r="40" fill="#ff6b6b" opacity="0.07"/>
  <circle cx="520" cy="70" r="50" fill="#ffd93d" opacity="0.06"/>
  <!-- Skillet -->
  <ellipse cx="300" cy="250" rx="145" ry="80" fill="#2a2a2a" stroke="#444" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="300" cy="240" rx="135" ry="68" fill="#333"/>
  <!-- Tomato sauce base -->
  <ellipse cx="300" cy="235" rx="125" ry="58" fill="#c0392b" opacity="0.85"/>
  <ellipse cx="300" cy="230" rx="120" ry="52" fill="#e74c3c" opacity="0.6"/>
  <!-- Sauce texture -->
  <g fill="#d63031" opacity="0.4">
    <ellipse cx="260" cy="225" rx="20" ry="8"/>
    <ellipse cx="340" cy="232" rx="18" ry="7"/>
  </g>
  <!-- Eggs in wells -->
  <g filter="url(#shadow)">
    <ellipse cx="265" cy="225" rx="24" ry="20" fill="#fff" opacity="0.92"/>
    <ellipse cx="265" cy="223" rx="10" ry="9" fill="#ffd93d"/>
    <ellipse cx="265" cy="221" rx="4" ry="3.5" fill="#ffeb99" opacity="0.5"/>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="335" cy="228" rx="23" ry="19" fill="#fff" opacity="0.9"/>
    <ellipse cx="335" cy="226" rx="10" ry="8.5" fill="#ffd93d"/>
    <ellipse cx="335" cy="224" rx="4" ry="3.5" fill="#ffeb99" opacity="0.5"/>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="300" cy="245" rx="22" ry="18" fill="#fff" opacity="0.88"/>
    <ellipse cx="300" cy="243" rx="9" ry="8" fill="#ffd93d"/>
    <ellipse cx="300" cy="241" rx="3.5" ry="3" fill="#ffeb99" opacity="0.5"/>
  </g>
  <!-- Parsley flecks -->
  <g fill="#27ae60" opacity="0.7">
    <circle cx="248" cy="215" r="2"/>
    <circle cx="318" cy="218" r="2.2"/>
    <circle cx="280" cy="248" r="1.8"/>
    <circle cx="355" cy="240" r="2"/>
    <circle cx="310" cy="260" r="1.5"/>
  </g>
  <!-- Skillet handle -->
  <rect x="435" y="232" width="65" height="12" rx="6" fill="#333" stroke="#444" stroke-width="1" filter="url(#shadow)"/>
  <!-- Steam -->
  <g stroke="#fff" stroke-width="1.5" fill="none" opacity="0.12">
    <path d="M 275 185 Q 270 170 275 155 Q 280 140 275 125"/>
    <path d="M 300 180 Q 295 165 300 150 Q 305 135 300 120"/>
    <path d="M 325 185 Q 320 170 325 155 Q 330 140 325 125"/>
  </g>
  <text x="300" y="152" text-anchor="middle" font-size="56" filter="url(#shadow)">🍳</text>
  <text x="300" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f0e6ff" font-weight="bold" filter="url(#shadow)">Shakshuka</text>
  <text x="300" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a89bc2">Spiced &amp; Savory</text>
</svg>