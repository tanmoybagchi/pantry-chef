<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0545"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#0d3b66"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="45%">
      <stop offset="0%" style="stop-color:#ffd93d;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="250" rx="220" ry="180" fill="url(#glow)"/>
  <!-- Decorative circles -->
  <circle cx="80" cy="60" r="40" fill="#c77dff" opacity="0.08"/>
  <circle cx="520" cy="80" r="55" fill="#4d96ff" opacity="0.08"/>
  <circle cx="500" cy="340" r="35" fill="#ffd93d" opacity="0.06"/>
  <!-- Bowl shape -->
  <ellipse cx="300" cy="240" rx="140" ry="90" fill="#2a1a4a" stroke="#ffd93d" stroke-width="2" stroke-opacity="0.3" filter="url(#shadow)"/>
  <ellipse cx="300" cy="220" rx="130" ry="70" fill="#3d2a5c"/>
  <!-- Rice grains -->
  <g fill="#f5f0e0" opacity="0.9">
    <ellipse cx="270" cy="210" rx="8" ry="3" transform="rotate(-20 270 210)"/>
    <ellipse cx="290" cy="205" rx="8" ry="3" transform="rotate(15 290 205)"/>
    <ellipse cx="310" cy="208" rx="8" ry="3" transform="rotate(-10 310 208)"/>
    <ellipse cx="330" cy="212" rx="8" ry="3" transform="rotate(25 330 212)"/>
    <ellipse cx="280" cy="225" rx="8" ry="3" transform="rotate(5 280 225)"/>
    <ellipse cx="300" cy="220" rx="8" ry="3" transform="rotate(-15 300 220)"/>
    <ellipse cx="320" cy="218" rx="8" ry="3" transform="rotate(20 320 218)"/>
    <ellipse cx="260" cy="220" rx="7" ry="3" transform="rotate(10 260 220)"/>
    <ellipse cx="340" cy="225" rx="7" ry="3" transform="rotate(-5 340 225)"/>
  </g>
  <!-- Veggie bits -->
  <rect x="275" y="200" width="6" height="6" rx="1" fill="#6bcb77" opacity="0.8" transform="rotate(15 278 203)"/>
  <rect x="315" y="215" width="5" height="5" rx="1" fill="#ff6b6b" opacity="0.7" transform="rotate(-10 317 217)"/>
  <rect x="295" y="230" width="6" height="4" rx="1" fill="#ffa94d" opacity="0.7"/>
  <rect x="340" y="205" width="5" height="5" rx="1" fill="#6bcb77" opacity="0.6" transform="rotate(30 342 207)"/>
  <!-- Egg bits -->
  <ellipse cx="305" cy="195" rx="10" ry="8" fill="#ffd93d" opacity="0.6"/>
  <!-- Emoji -->
  <text x="300" y="160" text-anchor="middle" font-size="64" filter="url(#shadow)">🍚</text>
  <!-- Title -->
  <text x="300" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f0e6ff" font-weight="bold" filter="url(#shadow)">Fried Rice</text>
  <text x="300" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a89bc2">Quick &amp; Savory</text>
</svg>