<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0545"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#0d2a3e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#ffd93d;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="240" rx="200" ry="170" fill="url(#glow)"/>
  <circle cx="80" cy="55" r="42" fill="#ffd93d" opacity="0.06"/>
  <circle cx="520" cy="75" r="50" fill="#c77dff" opacity="0.06"/>
  <!-- Plate -->
  <ellipse cx="300" cy="260" rx="155" ry="55" fill="#e8e0d0" opacity="0.08"/>
  <!-- Pasta pile -->
  <g filter="url(#shadow)">
    <path d="M 220 240 Q 240 200 300 210 Q 360 200 380 240 Q 370 270 300 275 Q 230 270 220 240Z" fill="#e8c96a"/>
    <path d="M 230 235 Q 250 205 300 212 Q 350 205 370 235 Q 360 260 300 265 Q 240 260 230 235Z" fill="#f0d87a"/>
  </g>
  <!-- Spaghetti strands -->
  <g fill="none" stroke="#e8c96a" stroke-width="2.5" opacity="0.6">
    <path d="M 240 230 Q 260 215 290 225 Q 320 235 340 220"/>
    <path d="M 250 240 Q 275 225 305 235 Q 330 245 355 230"/>
    <path d="M 235 250 Q 260 235 285 245 Q 315 255 340 242"/>
    <path d="M 255 255 Q 278 243 305 250 Q 330 257 350 248"/>
  </g>
  <!-- Cream sauce -->
  <g fill="#fff5d6" opacity="0.35">
    <ellipse cx="280" cy="230" rx="25" ry="8"/>
    <ellipse cx="320" cy="240" rx="20" ry="7"/>
    <ellipse cx="300" cy="250" rx="22" ry="6"/>
  </g>
  <!-- Parsley flecks -->
  <g fill="#6bcb77" opacity="0.7">
    <circle cx="275" cy="222" r="2.5"/>
    <circle cx="310" cy="228" r="2"/>
    <circle cx="330" cy="245" r="2.5"/>
    <circle cx="265" cy="248" r="2"/>
    <circle cx="295" cy="255" r="1.8"/>
  </g>
  <!-- Parmesan shavings -->
  <g fill="#fff" opacity="0.25">
    <rect x="285" y="215" width="14" height="3" rx="1.5" transform="rotate(-15 292 216)"/>
    <rect x="320" y="235" width="12" height="2.5" rx="1.2" transform="rotate(10 326 236)"/>
  </g>
  <!-- Steam -->
  <g stroke="#fff" stroke-width="1.5" fill="none" opacity="0.12">
    <path d="M 280 185 Q 275 170 280 155 Q 285 140 280 125"/>
    <path d="M 300 180 Q 295 165 300 150 Q 305 135 300 120"/>
    <path d="M 320 185 Q 315 170 320 155 Q 325 140 320 125"/>
  </g>
  <text x="300" y="155" text-anchor="middle" font-size="56" filter="url(#shadow)">🍝</text>
  <text x="300" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f0e6ff" font-weight="bold" filter="url(#shadow)">Creamy Garlic Pasta</text>
  <text x="300" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a89bc2">Rich &amp; Indulgent</text>
</svg>