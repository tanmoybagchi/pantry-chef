<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3b2e"/>
      <stop offset="50%" style="stop-color:#1a4535"/>
      <stop offset="100%" style="stop-color:#0d2145"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="40%">
      <stop offset="0%" style="stop-color:#6bcb77;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="240" rx="200" ry="160" fill="url(#glow)"/>
  <!-- Decorative -->
  <circle cx="90" cy="50" r="45" fill="#6bcb77" opacity="0.06"/>
  <circle cx="510" cy="70" r="50" fill="#ffd93d" opacity="0.06"/>
  <circle cx="480" cy="350" r="30" fill="#6bcb77" opacity="0.05"/>
  <!-- Toast base -->
  <rect x="180" y="200" width="240" height="80" rx="12" fill="#c4956a" filter="url(#shadow)"/>
  <rect x="185" y="205" width="230" height="70" rx="10" fill="#d4a574"/>
  <!-- Crust edges -->
  <rect x="180" y="200" width="240" height="8" rx="4" fill="#a87c52"/>
  <!-- Avocado spread -->
  <ellipse cx="300" cy="225" rx="100" ry="30" fill="#7cb342"/>
  <ellipse cx="300" cy="220" rx="90" ry="25" fill="#8bc34a" opacity="0.8"/>
  <!-- Avocado slices -->
  <path d="M 260 210 Q 280 195 300 210" fill="none" stroke="#558b2f" stroke-width="2" opacity="0.6"/>
  <path d="M 280 210 Q 300 195 320 210" fill="none" stroke="#558b2f" stroke-width="2" opacity="0.6"/>
  <path d="M 300 210 Q 320 195 340 210" fill="none" stroke="#558b2f" stroke-width="2" opacity="0.6"/>
  <!-- Egg on top -->
  <ellipse cx="300" cy="200" rx="28" ry="22" fill="#fff" opacity="0.9" filter="url(#shadow)"/>
  <ellipse cx="300" cy="198" rx="12" ry="10" fill="#ffd93d"/>
  <!-- Red pepper flakes -->
  <circle cx="265" cy="205" r="2" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="335" cy="210" r="1.5" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="310" cy="230" r="1.5" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="280" cy="225" r="2" fill="#ff6b6b" opacity="0.5"/>
  <!-- Emoji -->
  <text x="300" y="155" text-anchor="middle" font-size="56" filter="url(#shadow)">🥑</text>
  <!-- Title -->
  <text x="300" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f0e6ff" font-weight="bold" filter="url(#shadow)">Avocado Toast</text>
  <text x="300" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a89bc2">Fresh &amp; Healthy</text>
</svg>