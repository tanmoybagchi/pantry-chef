<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0545"/>
      <stop offset="50%" style="stop-color:#451a0a"/>
      <stop offset="100%" style="stop-color:#0d2145"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="240" rx="200" ry="170" fill="url(#glow)"/>
  <circle cx="75" cy="60" r="40" fill="#ff6b6b" opacity="0.07"/>
  <circle cx="525" cy="75" r="50" fill="#ffd93d" opacity="0.06"/>
  <!-- Bowl -->
  <ellipse cx="300" cy="250" rx="135" ry="82" fill="#2a0e0e" stroke="#ff6b6b" stroke-width="1.5" stroke-opacity="0.2" filter="url(#shadow)"/>
  <ellipse cx="300" cy="235" rx="125" ry="65" fill="#3d1515"/>
  <!-- Soup base -->
  <ellipse cx="300" cy="230" rx="118" ry="57" fill="#c0392b" opacity="0.85"/>
  <ellipse cx="300" cy="225" rx="112" ry="50" fill="#e74c3c" opacity="0.6"/>
  <!-- Soup surface highlights -->
  <ellipse cx="280" cy="218" rx="30" ry="12" fill="#ff7675" opacity="0.3"/>
  <ellipse cx="330" cy="230" rx="18" ry="8" fill="#ff7675" opacity="0.2"/>
  <!-- Cream swirl -->
  <path d="M 280 225 Q 295 218 310 225 Q 325 232 310 235 Q 295 238 280 232 Z" fill="#fff5e6" opacity="0.35"/>
  <path d="M 290 222 Q 300 218 310 222" fill="none" stroke="#fff5e6" stroke-width="2" opacity="0.4"/>
  <!-- Basil leaves -->
  <g filter="url(#shadow)">
    <ellipse cx="308" cy="215" rx="10" ry="5" fill="#27ae60" opacity="0.8" transform="rotate(-20 308 215)"/>
    <ellipse cx="298" cy="218" rx="8" ry="4" fill="#2ecc71" opacity="0.7" transform="rotate(15 298 218)"/>
    <line x1="298" y1="218" x2="305" y2="214" stroke="#1e8449" stroke-width="0.7" opacity="0.5"/>
  </g>
  <!-- Steam -->
  <g stroke="#fff" stroke-width="1.5" fill="none" opacity="0.13">
    <path d="M 275 178 Q 270 163 275 148 Q 280 133 275 118"/>
    <path d="M 300 172 Q 295 157 300 142 Q 305 127 300 112"/>
    <path d="M 325 178 Q 320 163 325 148 Q 330 133 325 118"/>
  </g>
  <text x="300" y="155" text-anchor="middle" font-size="56" filter="url(#shadow)">🍅</text>
  <text x="300" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f0e6ff" font-weight="bold" filter="url(#shadow)">Classic Tomato Soup</text>
  <text x="300" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a89bc2">Warm &amp; Comforting</text>
</svg>